spring:
  application:
    name: produit_service
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/produit_db?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    enabled: false
